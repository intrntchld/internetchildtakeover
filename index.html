<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="underground bass portal for internet child - sub drops, raw vibes, hidden beats.">
    <meta name="keywords" content="internet child, edm, bass music, sub bass, hacker portal, matrix drops">
    <title>Internet Child</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            width: 100%;
            height: 100%;
        }
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 10px;
        }
        h1 {
            font-size: 1.8em;
            text-shadow: 0 0 8px #0f0;
            animation: glitch 1s linear infinite, pulse 3s infinite;
            cursor: pointer;
        }
        .console {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #333;
            width: 70%;
            max-width: 500px;
            margin: 10px auto;
            padding: 8px;
            animation: pulse 3s infinite;
        }
        .console p {
            margin: 0;
            line-height: 1.4;
            font-size: 0.9em;
        }
        .link {
            color: #0f0;
            text-decoration: none;
            font-size: 1em;
            margin: 5px;
            display: inline-block;
            cursor: pointer;
        }
        .link:hover {
            text-shadow: 0 0 8px #0ff;
        }
        @keyframes glitch {
            2%, 64% { transform: translate(1px, 0) skew(0deg); }
            4%, 60% { transform: translate(-1px, 0) skew(0deg); }
            62% { transform: translate(0, 0) skew(3deg); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.02); }
        }
        .hidden-egg {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5em;
            color: #f00;
            animation: bounce 1s infinite;
            text-shadow: 0 0 8px #0f0;
        }
        @keyframes bounce {
            0%, 100% { transform: translate(-50%, 0); }
            50% { transform: translate(-50%, -15px); }
        }
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #000;
            border: 2px solid #0f0;
            padding: 20px;
            box-shadow: 0 0 20px #0f0;
            z-index: 10;
            text-align: center;
        }
        .modal-button {
            background: #000;
            color: #0f0;
            border: 1px solid #0f0;
            margin: 5px;
            padding: 5px 10px;
            cursor: pointer;
        }
        .modal-button:hover {
            background: #0f0;
            color: #000;
        }
        .special-vibe {
            animation: rainbow 5s linear infinite;
        }
        @keyframes rainbow {
            0% { color: #f00; }
            20% { color: #ff0; }
            40% { color: #0f0; }
            60% { color: #0ff; }
            80% { color: #00f; }
            100% { color: #f0f; }
        }

        /* Media queries for mobile responsiveness */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.5em;
            }
            .console p {
                font-size: 0.8em;
            }
            .link {
                font-size: 0.9em;
            }
            .console {
                width: 90%;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.2em;
            }
            .console p {
                font-size: 0.7em;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="container">
        <h1 onclick="showTitleEgg()">Internet Child</h1>
        <div class="console">
            <p id="quote">loading...</p>
            <p id="joke">loading...</p>
            <p id="motivation">loading...</p>
        </div>
        <div>
            <a class="link" href="https://soundcloud.com/intrntchld" target="_blank">soundcloud stream</a><br>
            <a class="link" href="https://open.spotify.com/artist/2GMufAZyrN3DElodGibjh6" target="_blank">spotify stream</a><br>
            <a class="link" href="https://music.apple.com/us/artist/internet-child/1701080070" target="_blank">apple music stream</a><br>
            <a class="link" onclick="mainNodeAction()">main node</a><br>
            <a class="link" onclick="showModal()">decode drop</a>
        </div>
        <div id="easter-egg" class="hidden-egg">sub unlocked</div>
        <div id="title-egg" class="hidden-egg" style="color: #0ff;">bass matrix</div>
        <div id="modal" class="modal">
            <div id="timer">Decoding: 10</div>
            <button class="modal-button" onclick="window.open('https://www.internetchildmusic.com', '_blank')">Core</button>
            <button class="modal-button" onclick="window.open('https://www.facebook.com/intrntchld', '_blank')">Echo</button>
            <button class="modal-button" onclick="window.open('https://twitter.com/IntrntChld', '_blank')">Pulse</button>
            <button class="modal-button" onclick="window.open('https://soundcloud.com/intrntchld', '_blank')">Sub</button>
            <button class="modal-button" onclick="window.open('https://instagram.com/internet_child_/', '_blank')">Viz</button>
        </div>
    </div>

    <script>
        // Matrix rain with 101010 - full width and height
        try {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            if (!ctx) throw new Error('Canvas context not supported');

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();

            const chars = '101010';
            const fontSize = 12;
            let columns = Math.floor(canvas.width / fontSize);
            let drops = Array(columns).fill(0).map(() => Math.random() * canvas.height / fontSize);

            function draw() {
                try {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#0f0';
                    ctx.font = fontSize + 'px Courier New';

                    for (let i = 0; i < drops.length; i++) {
                        const text = chars.charAt(Math.floor(Math.random() * chars.length));
                        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
                            drops[i] = 0;
                        drops[i]++;
                    }
                } catch (e) {
                    console.error('Draw error:', e.message);
                }
            }

            setInterval(draw, 30);

            window.addEventListener('resize', () => {
                resizeCanvas();
                columns = Math.floor(canvas.width / fontSize);
                drops = Array(columns).fill(0).map(() => Math.random() * canvas.height / fontSize);
            });
        } catch (e) {
            console.error('Canvas initialization error:', e.message);
        }

        // Positive/kid-friendly edm/bass-themed content arrays (enigmatic yet uplifting)
        const quotes = [
            "basslines light the digital path",
            "beats dance in friendly shadows",
            "unlock the joyful low-end adventure",
            "rhythms build happy binary worlds",
            "explore the fun sub-bass glow"
        ];

        const jokes = [
            "bass dropped? fun glitch ahead",
            "sub hits with a smile code",
            "edm's secret: happy encrypted beats",
            "why the glow? light bass load",
            "beats play in 101 sunshine"
        ];

        const motivations = [
            "build bass dreams with joy",
            "drop fun, rise bright",
            "code your sub, enjoy the light",
            "bass creates happy codes",
            "evolve the drop, share the grid fun",
            "vibing and thriving"
        ];

        function getRandom(array) {
            return array[Math.floor(Math.random() * array.length)];
        }

        // Load random content with error handling
        try {
            const quoteEl = document.getElementById('quote');
            const jokeEl = document.getElementById('joke');
            const motivationEl = document.getElementById('motivation');

            if (quoteEl) quoteEl.textContent = getRandom(quotes);
            if (jokeEl) jokeEl.textContent = getRandom(jokes);
            if (motivationEl) {
                const motivationText = getRandom(motivations);
                motivationEl.textContent = motivationText;
                if (motivationText === "vibing and thriving") {
                    // Special hidden thing: rainbow animation on title and console
                    document.querySelector('h1').classList.add('special-vibe');
                    document.querySelector('.console').classList.add('special-vibe');
                    setTimeout(() => {
                        document.querySelector('h1').classList.remove('special-vibe');
                        document.querySelector('.console').classList.remove('special-vibe');
                    }, 5000); // lasts 5 seconds
                }
            }
        } catch (e) {
            console.error('Content loading error:', e.message);
        }

        // Functions
        function showEasterEgg() {
            try {
                const egg = document.getElementById('easter-egg');
                if (egg) {
                    egg.textContent = getRandom(['sub unlocked', 'drop decoded', 'grid surge']);
                    egg.style.display = 'block';
                    setTimeout(() => { egg.style.display = 'none'; }, 3000);
                }
            } catch (e) {
                console.error('Easter egg error:', e.message);
            }
        }

        function showTitleEgg() {
            try {
                const egg = document.getElementById('title-egg');
                if (egg) {
                    egg.style.display = 'block';
                    setTimeout(() => { egg.style.display = 'none'; }, 3000);
                }
            } catch (e) {
                console.error('Title egg error:', e.message);
            }
        }

        // Random easter egg on load (10% chance)
        try {
            if (Math.random() < 0.1) {
                showEasterEgg();
            }
        } catch (e) {
            console.error('Load easter egg error:', e.message);
        }

        let countdownInterval;
        function showModal() {
            const modal = document.getElementById('modal');
            const timer = document.getElementById('timer');
            modal.style.display = 'block';
            let countdown = 10;
            timer.textContent = `Decoding: ${countdown}`;
            countdownInterval = setInterval(() => {
                countdown--;
                timer.textContent = `Decoding: ${countdown}`;
                if (countdown <= 0) {
                    clearInterval(countdownInterval);
                    modal.style.display = 'none';
                }
            }, 1000);
        }

        function mainNodeAction() {
            const actions = [
                () => window.open('https://www.internetchildmusic.com', '_blank'),
                () => showEasterEgg(),
                () => window.open(getRandom(['https://soundcloud.com/intrntchld', 'https://open.spotify.com/artist/2GMufAZyrN3DElodGibjh6']), '_blank'),
                () => alert(getRandom(motivations))
            ];
            getRandom(actions)();
  // Simplified Easter egg trigger: Press 'i' then 'c' for the same effect
        let icSequence = [73, 67]; // 73 = 'I' key (uppercase i), 67 = 'C' key (handles both cases as keyCode is uppercase)
        let userInput = [];
        document.addEventListener('keydown', (e) => {
            userInput.push(e.keyCode);
            console.log("Key pressed:", e.keyCode); // Debug: Log each key press
            if (userInput.length > 2) userInput.shift(); // Keep only last 2 keys
            if (userInput.toString() === icSequence.toString()) {
                console.log("IC Code activated!"); // Debug: Confirm activation
                document.body.style.color = 'cyan';
                const motivationEl = document.getElementById('motivation');
                if (motivationEl) motivationEl.textContent = "IC unlocked: Extra vibes activated!";
            }
        });
    </script>
</body>
</html>
